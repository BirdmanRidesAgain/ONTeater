# Single environment for ONTeater process containers (linux/amd64 or linux/arm64).
# Pin Python for NextDenovo correction stage stability.
#
# quickmerge + purge_dups are required for postprocess merge/purge steps.
# QUAST: bioconda only ships py313/py27 builds; we install quast via pip into
# this py310 env (validated on linux/amd64). Compleasm/sepp remain excluded
# here due to solver conflicts; conda profile can still pull them per-process.
name: oneteater
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - pigz
  - flye
  - minimap2
  - racon=1.5.0=*_4
  - nanoplot
  - nanofilt
  - nextdenovo=2.5.2
  - quickmerge
  - purge_dups
  - pip
  - pip:
      - quast
